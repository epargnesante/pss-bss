                    {!showUnlock ? (
                        <button
                            style={{ ...styles.button, background: '#8dc351' }}
                            onClick={() => setShowUnlock(true)}
                        >
                            🔓 Déverrouiller
                        </button>
                    ) : (
                        <>
                            <div style={{ marginBottom: '16px' }}>
                                <label style={styles.label}>Mot de passe</label>
                                <input
                                    type="password"
                                    style={styles.input}
                                    placeholder="••••••••"
                                    value={password}
                                    onChange={e => setPassword(e.target.value)}
                                    onKeyDown={e => e.key === 'Enter' && handleUnlockWallet()}
                                />
                            </div>
                            
                            <div style={{ display: 'flex', gap: '8px' }}>
                                <button
                                    style={{ ...styles.button, background: '#8dc351', flex: 1 }}
                                    onClick={handleUnlockWallet}
                                >
                                    Déverrouiller
                                </button>
                                <button
                                    style={{ ...styles.buttonSecondary, flex: 1 }}
                                    onClick={resetForms}
                                >
                                    Annuler
                                </button>
                            </div>
                        </>
                    )}
                </div>
            ) : (
                /* Wallet déverrouillé */
                <>
                    {/* Solde */}
                    <div style={{
                        ...styles.card,
                        background: 'linear-gradient(135deg, rgba(141, 195, 81, 0.15), rgba(107, 163, 45, 0.1))',
                        border: '1px solid rgba(141, 195, 81, 0.3)'
                    }}>
                        <div style={{ 
                            display: 'flex', 
                            justifyContent: 'space-between', 
                            alignItems: 'center',
                            marginBottom: '12px'
                        }}>
                            <span style={{ color: 'var(--text-muted)', fontSize: '13px' }}>
                                Solde disponible
                            </span>
                            <span style={{ 
                                color: '#8dc351', 
                                fontSize: '12px',
                                display: 'flex',
                                alignItems: 'center',
                                gap: '4px'
                            }}>
                                🔓 Déverrouillé
                            </span>
                        </div>
                        
                        <div style={{ textAlign: 'center' }}>
                            {balance ? (
                                <>
                                    <p style={{ 
                                        fontSize: '28px', 
                                        fontWeight: '700', 
                                        color: '#8dc351',
                                        fontFamily: "'JetBrains Mono', monospace"
                                    }}>
                                        {formatSatoshis(balance.total)}
                                    </p>
                                    <p style={{ color: 'var(--text-muted)', fontSize: '14px' }}>
                                        {balance.total} satoshis
                                        {balance.sufficient_for_anchor && (
                                            <span style={{ color: '#8dc351', marginLeft: '8px' }}>
                                                ✓ Ancrage possible
                                            </span>
                                        )}
                                    </p>
                                </>
                            ) : (
                                <p style={{ color: 'var(--text-muted)' }}>—</p>
                            )}
                        </div>
                        
                        <div style={{ display: 'flex', gap: '8px', marginTop: '16px' }}>
                            <button style={{ ...styles.buttonSmall, flex: 1 }} onClick={refreshBalance}>
                                <Icons.RefreshCw /> Actualiser
                            </button>
                            <button 
                                style={{ ...styles.buttonSmall, flex: 1, background: 'var(--bg-tertiary)' }} 
                                onClick={handleLockWallet}
                            >
                                🔒 Verrouiller
                            </button>
                        </div>
                    </div>
                    
                    {/* Adresse et QR */}
                    <div style={styles.card}>
                        <h3 style={{ fontSize: '16px', fontWeight: '600', marginBottom: '16px' }}>
                            Recevoir des BCH
                        </h3>
                        
                        {qrDataUrl && (
                            <div style={{ display: 'flex', justifyContent: 'center', marginBottom: '16px' }}>
                                <img 
                                    src={qrDataUrl} 
                                    alt="QR Code adresse BCH"
                                    style={{
                                        borderRadius: 'var(--radius-sm)',
                                        border: '1px solid var(--border-color)'
                                    }}
                                />
                            </div>
                        )}
                        
                        <p style={{
                            fontFamily: "'JetBrains Mono', monospace",
                            fontSize: '11px',
                            color: '#8dc351',
                            wordBreak: 'break-all',
                            background: 'var(--bg-secondary)',
                            padding: '12px',
                            borderRadius: 'var(--radius-sm)',
                            textAlign: 'center',
                            marginBottom: '12px'
                        }}>
                            {wallet.address}
                        </p>
                        
                        <button style={styles.buttonSecondary} onClick={copyAddress}>
                            <Icons.Copy /> Copier l'adresse
                        </button>
                    </div>
                    
                    {/* Export WIF (avec confirmation) */}
                    <div style={styles.card}>
                        <h3 style={{ fontSize: '16px', fontWeight: '600', marginBottom: '12px', color: 'var(--accent-warning)' }}>
                            ⚠️ Exporter la clé privée
                        </h3>
                        
                        {!showExport ? (
                            <>
                                <p style={{ color: 'var(--text-secondary)', fontSize: '13px', marginBottom: '16px' }}>
                                    Exportez vos données de récupération (phrase et/ou WIF).
                                </p>
                                <button
                                    style={{
                                        ...styles.buttonSecondary,
                                        borderColor: 'var(--accent-warning)',
                                        color: 'var(--accent-warning)'
                                    }}
                                    onClick={() => setShowExport(true)}
                                >
                                    🔑 Exporter
                                </button>
                            </>
                        ) : !(exportedWif || exportedSeed) ? (
                            <>
                                <div style={{
                                    background: 'rgba(253, 203, 110, 0.1)',
                                    border: '1px solid rgba(253, 203, 110, 0.3)',
                                    borderRadius: 'var(--radius-sm)',
                                    padding: '12px',
                                    marginBottom: '16px'
                                }}>
                                    <p style={{ color: 'var(--accent-warning)', fontSize: '13px' }}>
                                        ⚠️ ATTENTION: Quiconque possède ce WIF peut voler vos fonds !
                                    </p>
                                </div>
                                
                                <div style={{ marginBottom: '12px' }}>
                                    <label style={styles.label}>Mot de passe du wallet</label>
                                    <input
                                        type="password"
                                        style={styles.input}
                                        placeholder="••••••••"
                                        value={password}
                                        onChange={e => setPassword(e.target.value)}
                                    />
                                </div>
                                
                                <div style={{ marginBottom: '16px' }}>
                                    <label style={styles.label}>Tapez: JE COMPRENDS LE RISQUE</label>
                                    <input
                                        type="text"
                                        style={styles.input}
                                        placeholder="JE COMPRENDS LE RISQUE"
                                        value={exportConfirm}
                                        onChange={e => setExportConfirm(e.target.value)}
                                    />
                                </div>
                                
                                <div style={{ display: 'flex', gap: '8px' }}>
                                    <button
                                        style={{ 
                                            ...styles.button, 
                                            background: 'var(--accent-warning)', 
                                            flex: 1,
                                            opacity: exportConfirm !== 'JE COMPRENDS LE RISQUE' ? 0.5 : 1
                                        }}
                                        onClick={handleExportWallet}
                                        disabled={exportConfirm !== 'JE COMPRENDS LE RISQUE'}
                                    >
                                        Afficher le WIF
                                    </button>
                                    <button
                                        style={{ ...styles.buttonSecondary, flex: 1 }}
                                        onClick={resetForms}
                                    >
                                        Annuler
                                    </button>
                                </div>
                            </>
                        ) : (
                            <>
                                {/* Afficher la seed phrase si disponible */}
                                {exportedSeed && (
                                    <div style={{
                                        background: 'rgba(141, 195, 81, 0.1)',
                                        border: '1px solid rgba(141, 195, 81, 0.3)',
                                        borderRadius: 'var(--radius-sm)',
                                        padding: '12px',
                                        marginBottom: '12px'
                                    }}>
                                        <p style={{ fontSize: '12px', color: '#8dc351', fontWeight: '600', marginBottom: '8px' }}>
                                            📝 Phrase de récupération
                                        </p>
                                        <p style={{
                                            fontFamily: "'JetBrains Mono', monospace",
                                            fontSize: '11px',
                                            wordBreak: 'break-word',
                                            color: 'var(--text-primary)'
                                        }}>
                                            {exportedSeed}
                                        </p>
                                        <button 
                                            style={{ ...styles.buttonSmall, marginTop: '8px', width: '100%' }}
                                            onClick={() => {
                                                navigator.clipboard.writeText(exportedSeed);
                                                onShowToast('Phrase copiée !');
                                            }}
                                        >
                                            <Icons.Copy /> Copier la phrase
                                        </button>
                                    </div>
                                )}
                                
                                {/* Afficher le WIF si disponible */}
                                {exportedWif && (
                                    <div style={{
                                        background: 'rgba(253, 203, 110, 0.1)',
                                        border: '1px solid rgba(253, 203, 110, 0.3)',
                                        borderRadius: 'var(--radius-sm)',
                                        padding: '12px',
                                        marginBottom: '12px'
                                    }}>
                                        <p style={{ fontSize: '12px', color: 'var(--accent-warning)', fontWeight: '600', marginBottom: '8px' }}>
                                            🔑 Clé privée WIF
                                        </p>
                                        <p style={{
                                            fontFamily: "'JetBrains Mono', monospace",
                                            fontSize: '10px',
                                            wordBreak: 'break-all',
                                            color: 'var(--text-primary)'
                                        }}>
                                            {exportedWif}
                                        </p>
                                        <button 
                                            style={{ ...styles.buttonSmall, marginTop: '8px', width: '100%' }}
                                            onClick={copyWif}
                                        >
                                            <Icons.Copy /> Copier le WIF
                                        </button>
                                    </div>
                                )}
                                
                                <button 
                                    style={{ ...styles.buttonSecondary, width: '100%' }} 
                                    onClick={resetForms}
                                >
                                    Masquer tout
                                </button>
                            </>
                        )}
                    </div>
                    
                    {/* Info ancrage */}
                    <div style={{
                        marginTop: '16px',
                        padding: '16px',
                        background: 'rgba(116, 185, 255, 0.1)',
                        borderRadius: 'var(--radius)',
                        border: '1px solid rgba(116, 185, 255, 0.3)'
                    }}>
                        <p style={{ color: 'var(--accent-info)', fontSize: '14px', fontWeight: '500', marginBottom: '8px' }}>
                            ℹ️ Rôle de cette clé
                        </p>
                        <p style={{ color: 'var(--text-secondary)', fontSize: '13px' }}>
                            Cette clé sert uniquement à <strong>payer les frais d'ancrage</strong> (~400 sats par ancrage).
                            Vos accords sont signés avec votre <strong>clé d'identité</strong> (onglet Identité).
                        </p>
                    </div>
                </>
            )}
        </div>
    );
};

// ============================================
// APPLICATION PRINCIPALE
// ============================================

const App = () => {
    const [isLoading, setIsLoading] = useState(true);
    const [identity, setIdentity] = useState(null);
    const [agreements, setAgreements] = useState([]);
    const [contacts, setContacts] = useState([]);
    const [wallet, setWallet] = useState(null);
    const [activeTab, setActiveTab] = useState('identity');
    const [selectedAgreement, setSelectedAgreement] = useState(null);
    const [toast, setToast] = useState(null);
    const [showReceiveModal, setShowReceiveModal] = useState(false);
    
    // Initialisation
    useEffect(() => {
        initApp();
    }, []);

    // Vérifier si on arrive avec un lien de partage
    useEffect(() => {
        if (identity) {
            checkShareLink();
        }
    }, [identity]);
    
    const initApp = async () => {
        try {
            await Storage.init();
            
            // Initialiser le wallet local
            await LocalWallet.init();
            
            const storedIdentity = await Storage.getIdentity();
            const storedAgreements = await Storage.getAgreements();
            const storedContacts = await Storage.getContacts();
            const storedWallet = await Storage.getWallet();
            
            if (storedIdentity) {
                setIdentity(storedIdentity);
            }
            setAgreements(storedAgreements);
            setContacts(storedContacts);
            if (storedWallet) {
                setWallet(storedWallet);
            }
        } catch (error) {
            console.error('Erreur initialisation:', error);
        } finally {
            setIsLoading(false);
        }
    };

    const checkShareLink = () => {
        const urlParams = new URLSearchParams(window.location.search);
        const shareData = urlParams.get('share');
        if (shareData) {
            // Nettoyer l'URL
            window.history.replaceState({}, document.title, window.location.pathname);
            // Ouvrir le modal de réception
            setShowReceiveModal(true);
        }
    };
    
    const showToast = (message, type = 'success') => {
        setToast({ message, type });
    };
    
    const handleIdentityCreated = (newIdentity) => {
        setIdentity(newIdentity);
        setActiveTab('identity');
        showToast('Identité créée avec succès !');
    };
    
    const handleAgreementCreated = (agreement) => {
        setAgreements(prev => {
            const existing = prev.find(a => a.id === agreement.id);
            if (existing) {
                return prev.map(a => a.id === agreement.id ? agreement : a);
            }
            return [agreement, ...prev];
        });
        showToast('Accord créé avec succès !');
    };
    
    const handleContactAdded = (contact) => {
        setContacts(prev => {
            const existing = prev.find(c => c.publicKey === contact.publicKey);
            if (existing) return prev;
            return [contact, ...prev];
        });
    };
    
    const handleDeleteAgreement = async (id) => {
        await Storage.deleteAgreement(id);
        setAgreements(prev => prev.filter(a => a.id !== id));
        setSelectedAgreement(null);
        setActiveTab('agreements');
        showToast('Accord supprimé');
    };
    
    const handleUpdateStatus = async (id, newStatus) => {
        const agreement = agreements.find(a => a.id === id);
        if (agreement) {
            const updated = { ...agreement, status: newStatus };
            await Storage.saveAgreement(updated);
            setAgreements(prev => prev.map(a => a.id === id ? updated : a));
            setSelectedAgreement(updated);
            showToast(`Statut mis à jour : ${newStatus === 'respected' ? 'Respecté' : 'Rompu'}`);
        }
    };
    
    const handleAnchor = async (id, anchorManifest) => {
        const agreement = agreements.find(a => a.id === id);
        if (agreement) {
            const allSigned = agreement.manifest.parties.every(party =>
                agreement.signatures.some(sig => sig.publicKey === party.publicKey)
            );
            const updated = { 
                ...agreement, 
                anchor: anchorManifest,
                status: allSigned ? 'active' : 'awaiting_signature'
            };
            await Storage.saveAgreement(updated);
            setAgreements(prev => prev.map(a => a.id === id ? updated : a));
            setSelectedAgreement(updated);
            showToast('Preuve ancrée sur la blockchain !');
        }
    };

    const handleAgreementReceived = async (agreement) => {
        await Storage.saveAgreement(agreement);
        setAgreements(prev => {
            const existing = prev.find(a => a.id === agreement.id);
            if (existing) {
                return prev.map(a => a.id === agreement.id ? agreement : a);
            }
            return [agreement, ...prev];
        });

        // Ajouter l'autre partie comme contact
        const otherParty = agreement.manifest.parties.find(
            p => p.publicKey !== identity.publicKey
        );
        if (otherParty) {
            const existingContact = contacts.find(c => c.publicKey === otherParty.publicKey);
            if (!existingContact) {
                const contact = {
                    publicKey: otherParty.publicKey,
                    alias: otherParty.alias,
                    addedAt: new Date().toISOString()
                };
                await Storage.saveContact(contact);
                setContacts(prev => [contact, ...prev]);
            }
        }

        setShowReceiveModal(false);
        setActiveTab('agreements');
        setSelectedAgreement(agreement);
        showToast('Accord signé avec succès !');
    };
    
    // Loading screen
    if (isLoading) {
        return (
            <div style={{
                ...styles.container,
                justifyContent: 'center',
                alignItems: 'center'
            }}>
                <div style={{
                    width: '60px',
                    height: '60px',
                    borderRadius: '50%',
                    border: '3px solid var(--bg-tertiary)',
                    borderTopColor: 'var(--accent-primary)',
                    animation: 'spin 1s linear infinite'
                }} />
                <style>{`
                    @keyframes spin {
                        to { transform: rotate(360deg); }
                    }
                `}</style>
            </div>
        );
    }
    
    // Welcome screen si pas d'identité
    if (!identity) {
        return <WelcomeScreen onIdentityCreated={handleIdentityCreated} />;
    }
    
    return (
        <div style={styles.container}>
            {/* Header */}
            <header style={styles.header}>
                <div style={{ display: 'flex', alignItems: 'center', gap: '12px' }}>
                    <div style={{
                        width: '36px',
                        height: '36px',
                        background: 'linear-gradient(135deg, var(--accent-primary), var(--accent-secondary))',
                        borderRadius: '10px',
                        display: 'flex',
                        alignItems: 'center',
                        justifyContent: 'center'
                    }}>
                        <Icons.Shield />
                    </div>
                    <span style={{ fontWeight: '600', fontSize: '18px' }}>PSS/BSS</span>
                </div>
                
                <div style={{ display: 'flex', alignItems: 'center', gap: '12px' }}>
                    {/* Bouton recevoir un accord */}
                    <button
                        style={{
                            ...styles.buttonSmall,
                            background: 'var(--bg-tertiary)'
                        }}
                        onClick={() => setShowReceiveModal(true)}
                        title="Recevoir un accord"
                    >
                        <Icons.Inbox />
                    </button>

                    <div style={{
                        display: 'flex',
                        alignItems: 'center',
                        gap: '8px',
                        color: 'var(--text-secondary)',
                        fontSize: '13px'
                    }}>
                        <span>{identity.alias}</span>
                        <div style={{
                            width: '8px',
                            height: '8px',
                            borderRadius: '50%',
                            background: 'var(--accent-primary)'
                        }} />
                    </div>
                </div>
            </header>
            
            {/* Contenu principal */}
            <main style={{ flex: 1, paddingBottom: '100px' }}>
                {activeTab === 'identity' && !selectedAgreement && (
                    <IdentityScreen identity={identity} />
                )}
                
                {activeTab === 'new' && !selectedAgreement && (
                    <NewAgreementScreen
                        identity={identity}
                        contacts={contacts}
                        onAgreementCreated={handleAgreementCreated}
                        onContactAdded={handleContactAdded}
                    />
                )}
                
                {activeTab === 'agreements' && !selectedAgreement && (
                    <AgreementsScreen
                        agreements={agreements}
                        identity={identity}
                        onViewAgreement={setSelectedAgreement}
                        onDeleteAgreement={handleDeleteAgreement}
                    />
                )}

                {activeTab === 'wallet' && !selectedAgreement && (
                    <WalletScreen
                        onShowToast={showToast}
                    />
                )}
                
                {selectedAgreement && (
                    <AgreementDetailScreen
                        agreement={selectedAgreement}
                        identity={identity}
                        onBack={() => setSelectedAgreement(null)}
                        onDelete={handleDeleteAgreement}
                        onUpdateStatus={handleUpdateStatus}
                        onAnchor={handleAnchor}
                        onUpdate={(updated) => {
                            setSelectedAgreement(updated);
                            setAgreements(prev => prev.map(a => a.id === updated.id ? updated : a));
                        }}
                    />
                )}
            </main>
            
            {/* Navigation bottom */}
            {!selectedAgreement && (
                <nav style={{
                    position: 'fixed',
                    bottom: 0,
                    left: 0,
                    right: 0,
                    background: 'var(--bg-secondary)',
                    borderTop: '1px solid var(--border-color)',
                    display: 'flex',
                    justifyContent: 'center',
                    padding: '8px 16px',
                    paddingBottom: 'max(8px, env(safe-area-inset-bottom))'
                }}>
                    <div style={{
                        display: 'flex',
                        maxWidth: '400px',
                        width: '100%'
                    }}>
                        <div
                            style={{
                                ...styles.navItem,
                                ...(activeTab === 'identity' ? styles.navItemActive : {})
                            }}
                            onClick={() => setActiveTab('identity')}
                        >
                            <Icons.User />
                            <span style={{ fontSize: '12px' }}>Identité</span>
                        </div>
                        
                        <div
                            style={{
                                ...styles.navItem,
                                ...(activeTab === 'new' ? styles.navItemActive : {})
                            }}
                            onClick={() => setActiveTab('new')}
                        >
                            <div style={{
                                width: '44px',
                                height: '44px',
                                background: 'linear-gradient(135deg, var(--accent-primary), var(--accent-secondary))',
                                borderRadius: '50%',
                                display: 'flex',
                                alignItems: 'center',
                                justifyContent: 'center',
                                marginTop: '-20px',
                                boxShadow: '0 4px 12px rgba(0, 212, 170, 0.3)'
                            }}>
                                <Icons.Plus />
                            </div>
                        </div>
                        
                        <div
                            style={{
                                ...styles.navItem,
                                ...(activeTab === 'agreements' ? styles.navItemActive : {})
                            }}
                            onClick={() => setActiveTab('agreements')}
                        >
                            <Icons.FileText />
                            <span style={{ fontSize: '12px' }}>Accords</span>
                        </div>
                        
                        <div
                            style={{
                                ...styles.navItem,
                                ...(activeTab === 'wallet' ? styles.navItemActive : {}),
                                color: activeTab === 'wallet' ? '#8dc351' : 'var(--text-muted)'
                            }}
                            onClick={() => setActiveTab('wallet')}
                        >
                            <Icons.Wallet />
                            <span style={{ fontSize: '12px' }}>Wallet</span>
                        </div>
                    </div>
                </nav>
            )}

            {/* Modal réception d'accord */}
            {showReceiveModal && (
                <ReceiveAgreementModal
                    onClose={() => setShowReceiveModal(false)}
                    onReceived={handleAgreementReceived}
                    identity={identity}
                />
            )}
            
            {/* Toast notifications */}
            {toast && (
                <Toast
                    message={toast.message}
                    type={toast.type}
                    onClose={() => setToast(null)}
                />
            )}
        </div>
    );
};

// Render
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
