<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSS/BSS Simplifié</title>
    <meta name="description" content="Générer et signer des accords simplement entre deux personnes, avec QR code et lien.">
    <!-- Import React (UMD) -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <!-- Import TweetNaCl et utilitaires -->
    <script src="https://unpkg.com/tweetnacl@1.0.3/nacl-fast.min.js"></script>
    <script src="https://unpkg.com/tweetnacl-util@0.15.1/nacl-util.min.js"></script>
    <!-- QR Code generation library -->
    <script src="https://unpkg.com/qrcode@1.5.3/build/qrcode.min.js"></script>
    <style>
        body {
            font-family: sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            color: #333;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: #fff;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin: 20px;
            border-radius: 8px;
        }
        h1 {
            margin-top: 0;
        }
        label {
            display: block;
            margin-bottom: 4px;
            font-weight: bold;
        }
        input[type="text"], textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            margin-bottom: 12px;
            box-sizing: border-box;
        }
        button {
            padding: 10px 16px;
            border: none;
            border-radius: 4px;
            background: #007bff;
            color: #fff;
            cursor: pointer;
            margin-right: 8px;
        }
        button[disabled] {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn-secondary {
            background: #6c757d;
        }
        .qr-container {
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }
        .alert {
            padding: 12px;
            background: #e9ecef;
            border-radius: 4px;
            margin-bottom: 12px;
        }
        .link-box {
            padding: 10px;
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 4px;
            margin-top: 8px;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script>
    (function() {
      const { useState, useEffect, useRef } = React;

      // Utility functions
      function toBase64Url(str) {
        return btoa(encodeURIComponent(str)).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
      }
      function fromBase64Url(str) {
        let base64 = str.replace(/-/g,'+').replace(/_/g,'/');
        while (base64.length % 4) base64 += '=';
        return decodeURIComponent(atob(base64));
      }
      function compressForShare(obj) {
        const json = JSON.stringify(obj);
        return toBase64Url(json);
      }
      function decompressFromShare(str) {
        try {
          const json = fromBase64Url(str);
          return JSON.parse(json);
        } catch(e) {
          return null;
        }
      }
      async function sha256(text) {
        const encoder = new TextEncoder();
        const data = encoder.encode(text);
        const hashBuffer = await crypto.subtle.digest('SHA-256', data);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
      }
      function generateKeyPair() {
        const kp = nacl.sign.keyPair();
        return {
          publicKey: nacl.util.encodeBase64(kp.publicKey),
          privateKey: nacl.util.encodeBase64(kp.secretKey)
        };
      }
      function signMessage(message, privateKeyBase64) {
        const privateKey = nacl.util.decodeBase64(privateKeyBase64);
        const msgUint8 = nacl.util.decodeUTF8(message);
        const signature = nacl.sign.detached(msgUint8, privateKey);
        return nacl.util.encodeBase64(signature);
      }
      function verifySignature(message, signatureBase64, publicKeyBase64) {
        try {
          const publicKey = nacl.util.decodeBase64(publicKeyBase64);
          const signature = nacl.util.decodeBase64(signatureBase64);
          const msgUint8 = nacl.util.decodeUTF8(message);
          return nacl.sign.detached.verify(msgUint8, signature, publicKey);
        } catch(e) { return false; }
      }

      // Main App component
      function App() {
        // Determine if we are in receive mode (share param in URL)
        const urlParams = new URLSearchParams(window.location.search);
        const shareParam = urlParams.get('share');
        const initialMode = shareParam ? 'receive' : 'create';

        const [mode, setMode] = useState(initialMode);
        const [identity, setIdentity] = useState(null); // { publicKey, privateKey, alias }
        const [otherAlias, setOtherAlias] = useState('');
        const [agreementText, setAgreementText] = useState('');
        const [agreement, setAgreement] = useState(null); // after sign: { manifest, hash, signatures }
        const [shareData, setShareData] = useState(null);
        const [qrReady, setQrReady] = useState(false);
        const qrCanvasRef = useRef(null);
        // For receive mode
        const [receivedPackage, setReceivedPackage] = useState(null);
        const [receivedManifest, setReceivedManifest] = useState(null);
        const [receivedHash, setReceivedHash] = useState(null);
        const [receivedSignatures, setReceivedSignatures] = useState([]);
        const [aliasB, setAliasB] = useState('');
        const [identityB, setIdentityB] = useState(null);
        const [signedByB, setSignedByB] = useState(false);

        useEffect(() => {
          // If share param, decode package
          if (shareParam) {
            const pkg = decompressFromShare(shareParam);
            if (pkg && pkg.type === 'share.package') {
              setReceivedPackage(pkg);
              setReceivedManifest(pkg.agreement.manifest);
              setReceivedHash(pkg.agreement.hash);
              setReceivedSignatures(pkg.agreement.signatures || []);
            }
          }
        }, [shareParam]);

        // Generate QR when shareData changes
        useEffect(() => {
          if (shareData && qrCanvasRef.current) {
            QRCode.toCanvas(qrCanvasRef.current, shareData, { width: 256 }, function (error) {
              if (error) console.error(error);
              setQrReady(true);
            });
          }
        }, [shareData]);

        // Handlers
        const handleCreateIdentity = () => {
          if (!identity || !identity.alias) return;
          // Identity is already created
        };
        const handleIdentitySubmit = () => {
          // Generate key pair
          const keys = generateKeyPair();
          setIdentity({ publicKey: keys.publicKey, privateKey: keys.privateKey, alias: identity.alias });
        };
        const handleAliasChange = (e) => {
          setIdentity(prev => ({ ...prev, alias: e.target.value }));
        };
        const handleAgreementSubmit = async () => {
          if (!identity || !identity.alias || !agreementText.trim() || !otherAlias.trim()) return;
          // Create manifest
          const manifest = {
            type: 'agreement.manifest',
            version: '1.0',
            id: crypto.randomUUID(),
            parties: [ { alias: identity.alias }, { alias: otherAlias.trim() } ],
            text: agreementText.trim(),
            createdAt: new Date().toISOString()
          };
          const manifestString = JSON.stringify(manifest);
          const hash = await sha256(manifestString);
          // Sign
          const signature = signMessage(hash, identity.privateKey);
          const signatureManifest = {
            type: 'signature.manifest',
            version: '1.0',
            agreementId: manifest.id,
            agreementHash: hash,
            alias: identity.alias,
            publicKey: identity.publicKey,
            signature: signature,
            signedAt: new Date().toISOString()
          };
          const agreementObj = {
            manifest: manifest,
            hash: hash,
            signatures: [ signatureManifest ]
          };
          setAgreement(agreementObj);
          // Prepare share package
          const sharePackage = {
            type: 'share.package',
            version: '1.0',
            agreement: {
              id: manifest.id,
              manifest: manifest,
              hash: hash,
              signatures: [ signatureManifest ]
            },
              sender: {
                alias: identity.alias,
                publicKey: identity.publicKey
              },
              sharedAt: new Date().toISOString()
          };
          const comp = compressForShare(sharePackage);
          setShareData(comp);
        };

        const handleIdentityForm = (e) => {
          e.preventDefault();
          if (!identity || !identity.alias) return;
          const keys = generateKeyPair();
          setIdentity({ ...identity, publicKey: keys.publicKey, privateKey: keys.privateKey });
        };

        // Receive mode
        const handleIdentityBSubmit = () => {
          if (!aliasB.trim()) return;
          const keys = generateKeyPair();
          setIdentityB({ alias: aliasB.trim(), publicKey: keys.publicKey, privateKey: keys.privateKey });
        };
        const handleSignAsB = () => {
          if (!identityB || !receivedHash || !receivedManifest) return;
          // Sign the hash with B's private key
          const signature = signMessage(receivedHash, identityB.privateKey);
          const signatureManifest = {
            type: 'signature.manifest',
            version: '1.0',
            agreementId: receivedManifest.id,
            agreementHash: receivedHash,
            alias: identityB.alias,
            publicKey: identityB.publicKey,
            signature: signature,
            signedAt: new Date().toISOString()
          };
          const newSigs = [...receivedSignatures, signatureManifest];
          setReceivedSignatures(newSigs);
          setSignedByB(true);
        };

        const downloadFile = () => {
          if (!shareData) return;
          const pkg = decompressFromShare(shareData);
          const blob = new Blob([JSON.stringify(pkg, null, 2)], { type: 'application/json' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = 'accord-partage.json';
          a.click();
          URL.revokeObjectURL(url);
        };

        // Render
        if (mode === 'create') {
          // Identity step
          if (!identity || !identity.publicKey) {
            return (
              <div className="container">
                <h1>Votre identité</h1>
                <p>Choisissez un alias pour vous identifier dans l'accord.</p>
                <form onSubmit={handleIdentityForm}>
                  <label>Votre alias</label>
                  <input type="text" value={identity ? identity.alias || '' : ''} onChange={handleAliasChange} placeholder="ex: Alice" required />
                  <button type="submit">Créer mon identité</button>
                </form>
                <p className="alert">Aucune information n'est envoyée à un serveur. Votre clé privée reste stockée uniquement dans ce navigateur.</p>
              </div>
            );
          }
          // Agreement step
          if (!agreement) {
            return (
              <div className="container">
                <h1>Nouvel accord</h1>
                <label>Alias de l'autre personne</label>
                <input type="text" value={otherAlias} onChange={(e) => setOtherAlias(e.target.value)} placeholder="ex: Bob" required />
                <label>Texte de l'accord</label>
                <textarea rows="6" value={agreementText} onChange={(e) => setAgreementText(e.target.value)} placeholder="Décrivez l'accord..." required></textarea>
                <button onClick={handleAgreementSubmit}>Signer et créer</button>
              </div>
            );
          }
          // Share step
          if (shareData) {
            const currentUrl = window.location.origin + window.location.pathname;
            const shareLink = currentUrl + '?share=' + shareData;
            return (
              <div className="container">
                <h1>Partager l'accord</h1>
                <p>Faites signer l'autre personne en lui transmettant ce QR code ou ce lien.</p>
                <div className="qr-container">
                  <canvas ref={qrCanvasRef}></canvas>
                </div>
                {!qrReady && <p>Génération du QR...</p>}
                <button onClick={() => navigator.clipboard.writeText(shareLink)}>Copier le lien</button>
                <button className="btn-secondary" onClick={downloadFile}>Télécharger fichier</button>
                <div className="link-box">{shareLink}</div>
                <p className="alert">L'autre personne devra simplement ouvrir le lien ou scanner le QR pour signer à son tour.</p>
              </div>
            );
          }
        }

        if (mode === 'receive') {
          if (!receivedPackage) {
            return (
              <div className="container">
                <h1>Erreur</h1>
                <p>Données de partage invalides.</p>
              </div>
            );
          }
          // Step 1: Identity B
          if (!identityB || !identityB.publicKey) {
            return (
              <div className="container">
                <h1>Votre identité</h1>
                <p>Entrez votre alias pour signer cet accord.</p>
                <label>Votre alias</label>
                <input type="text" value={aliasB} onChange={(e) => setAliasB(e.target.value)} placeholder="ex: Bob" required />
                <button onClick={handleIdentityBSubmit}>Créer mon identité</button>
                <p className="alert">Une clé privée sera générée localement. Elle ne quitte pas votre navigateur.</p>
              </div>
            );
          }
          // Step 2: Review and sign
          if (!signedByB) {
            return (
              <div className="container">
                <h1>Signer l'accord</h1>
                <p><strong>Titre de l'accord</strong></p>
                <p>{receivedManifest.text}</p>
                <p><strong>Parties :</strong> {receivedManifest.parties.map((p,i) => p.alias).join(' et ')}</p>
                <button onClick={handleSignAsB}>Je signe cet accord</button>
              </div>
            );
          }
          // Step 3: Done
          return (
            <div className="container">
              <h1>Accord signé</h1>
              <p>Merci. Votre signature a été ajoutée.</p>
              <p><strong>Signatures :</strong></p>
              <ul>
                {receivedSignatures.map((sig, idx) => (
                  <li key={idx}>{sig.alias} – signé le {new Date(sig.signedAt).toLocaleString()}</li>
                ))}
              </ul>
              <p>Vous pouvez fermer cette page.</p>
            </div>
          );
        }

        return <div>Chargement...</div>;
      }

      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    })();
    </script>
</body>
</html>
