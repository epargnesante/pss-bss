const ReceiveAgreementModal = ({ onClose, onReceived, identity }) => {
    const [mode, setMode] = useState('choose'); // choose, scan, paste, file
    const [pastedData, setPastedData] = useState('');
    const [receivedPackage, setReceivedPackage] = useState(null);
    const [validationResult, setValidationResult] = useState(null);
    const [isSigning, setIsSigning] = useState(false);
    const [error, setError] = useState(null);
    const fileInputRef = useRef(null);

    const handleScan = async (data) => {
        setMode('choose');
        await processData(data);
    };

    const handlePaste = async () => {
        if (!pastedData.trim()) return;
        await processData(pastedData);
    };

    const handleFile = async (e) => {
        const file = e.target.files?.[0];
        if (!file) return;

        try {
            const pkg = await ShareService.importFromFile(file);
            await processPackage(pkg);
        } catch (err) {
            setError(err.message);
        }
    };

    const processData = async (data) => {
        setError(null);
        
        // Essayer de parser les données
        let pkg = ShareService.parseQRData(data);
        
        if (!pkg) {
            // Essayer comme URL
            pkg = ShareService.parseShareLink(data);
        }

        if (!pkg) {
            setError('Format de données invalide');
            return;
        }

        await processPackage(pkg);
    };

    const processPackage = async (pkg) => {
        setError(null);
        
        // Valider le paquet
        const validation = await BSS.validateSharePackage(pkg);
        setValidationResult(validation);

        if (!validation.valid) {
            setError(validation.error);
            return;
        }

        // Vérifier si c'est bien pour nous
        const isParty = pkg.agreement.manifest.parties.some(
            p => p.publicKey === identity.publicKey
        );

        if (!isParty) {
            setError('Cet accord ne vous concerne pas');
            return;
        }

        // Vérifier si on a déjà signé
        const alreadySigned = pkg.agreement.signatures.some(
            s => s.publicKey === identity.publicKey
        );

        if (alreadySigned) {
            setError('Vous avez déjà signé cet accord');
            return;
        }

        setReceivedPackage(pkg);
        setMode('review');
    };

    const handleSign = async () => {
        if (!receivedPackage) return;

        setIsSigning(true);
        try {
            // Signer l'accord
            const mySignature = Crypto.sign(receivedPackage.agreement.hash, identity.privateKey);
            const signatureManifest = BSS.createSignatureManifest(
                receivedPackage.agreement.id,
                receivedPackage.agreement.hash,
                identity.publicKey,
                mySignature
            );

            // Créer l'accord local avec toutes les signatures
            const agreement = {
                id: receivedPackage.agreement.id,
                manifest: receivedPackage.agreement.manifest,
                hash: receivedPackage.agreement.hash,
                signatures: [...receivedPackage.agreement.signatures, signatureManifest],
                status: 'active',
                anchor: null,
                createdAt: receivedPackage.agreement.manifest.createdAt,
                receivedAt: new Date().toISOString()
            };

            onReceived(agreement);
        } catch (err) {
            setError('Erreur lors de la signature: ' + err.message);
        } finally {
            setIsSigning(false);
        }
    };

    // Mode de choix
    if (mode === 'choose') {
        return (
            <Modal isOpen={true} onClose={onClose} title="Recevoir un accord">
                <p style={{ 
                    color: 'var(--text-secondary)', 
                    marginBottom: '24px',
                    fontSize: '14px',
                    textAlign: 'center'
                }}>
                    Comment souhaitez-vous recevoir l'accord ?
                </p>

                {error && (
                    <div style={{
                        background: 'rgba(225, 112, 85, 0.1)',
                        border: '1px solid var(--accent-danger)',
                        borderRadius: 'var(--radius-sm)',
                        padding: '12px',
                        marginBottom: '16px',
                        color: 'var(--accent-danger)',
                        fontSize: '14px'
                    }}>
                        {error}
                    </div>
                )}

                <div style={{ display: 'flex', flexDirection: 'column', gap: '12px' }}>
                    <button
                        style={styles.button}
                        onClick={() => setMode('scan')}
                    >
                        <Icons.Camera /> Scanner un QR code
                    </button>
                    
                    <button
                        style={styles.buttonSecondary}
                        onClick={() => setMode('paste')}
                    >
                        <Icons.Copy /> Coller un lien ou des données
                    </button>
                    
                    <button
                        style={styles.buttonSecondary}
                        onClick={() => fileInputRef.current?.click()}
                    >
                        <Icons.Upload /> Importer un fichier
                    </button>
                    
                    <input
                        ref={fileInputRef}
                        type="file"
                        accept=".json"
                        style={{ display: 'none' }}
                        onChange={handleFile}
                    />
                </div>
            </Modal>
        );
    }

    // Mode scan
    if (mode === 'scan') {
        return (
            <QRScanner
                onScan={handleScan}
                onClose={() => setMode('choose')}
            />
        );
    }

    // Mode coller
    if (mode === 'paste') {
        return (
            <Modal isOpen={true} onClose={() => setMode('choose')} title="Coller les données">
                {error && (
                    <div style={{
                        background: 'rgba(225, 112, 85, 0.1)',
                        border: '1px solid var(--accent-danger)',
                        borderRadius: 'var(--radius-sm)',
                        padding: '12px',
                        marginBottom: '16px',
                        color: 'var(--accent-danger)',
                        fontSize: '14px'
                    }}>
                        {error}
                    </div>
                )}

                <div style={{ marginBottom: '16px' }}>
                    <label style={styles.label}>Lien ou données JSON</label>
                    <textarea
                        style={{ ...styles.textarea, minHeight: '150px' }}
                        placeholder="Collez ici le lien de partage ou les données JSON de l'accord..."
                        value={pastedData}
                        onChange={e => setPastedData(e.target.value)}
                    />
                </div>

                <div style={{ display: 'flex', gap: '8px' }}>
                    <button
                        style={styles.buttonSecondary}
                        onClick={() => setMode('choose')}
                    >
                        Retour
                    </button>
                    <button
                        style={{ ...styles.button, flex: 1 }}
                        onClick={handlePaste}
                        disabled={!pastedData.trim()}
                    >
                        Valider
                    </button>
                </div>
            </Modal>
        );
    }

    // Mode review (accord reçu, prêt à signer)
    if (mode === 'review' && receivedPackage) {
        const manifest = receivedPackage.agreement.manifest;
        const sender = receivedPackage.sender;
        const otherParty = manifest.parties.find(p => p.publicKey !== identity.publicKey);

const NewAgreementScreen = ({ identity, contacts, onAgreementCreated, onContactAdded }) => {
    const [step, setStep] = useState(1);
    const [counterparty, setCounterparty] = useState(null);
    const [manualKey, setManualKey] = useState('');
    const [manualAlias, setManualAlias] = useState('');
    const [agreementText, setAgreementText] = useState('');
    const [deadline, setDeadline] = useState('');
    const [conditions, setConditions] = useState('');
    const [isCreating, setIsCreating] = useState(false);
    const [isAnchoring, setIsAnchoring] = useState(false);
    const [createdAgreement, setCreatedAgreement] = useState(null);
    const [showScanner, setShowScanner] = useState(false);
    
    // Fichier joint
    const [attachedFile, setAttachedFile] = useState(null);
    const [fileHash, setFileHash] = useState(null);
    const [isHashingFile, setIsHashingFile] = useState(false);
    const fileInputRef = useRef(null);
    
    // Calcule le hash d'un fichier
    const hashFile = async (file) => {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const arrayBuffer = e.target.result;
                    const hashBuffer = await crypto.subtle.digest('SHA-256', arrayBuffer);
                    const hashArray = Array.from(new Uint8Array(hashBuffer));
                    const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
                    resolve(hashHex);
                } catch (err) {
                    reject(err);
                }
            };
            reader.onerror = reject;
            reader.readAsArrayBuffer(file);
        });
    };
    
    // Gère la sélection d'un fichier
    const handleFileSelect = async (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        
        // Limite de taille : 50 Mo
        if (file.size > 50 * 1024 * 1024) {
            alert('Fichier trop volumineux (max 50 Mo)');
            return;
        }
        
        setIsHashingFile(true);
        setAttachedFile(file);
        
        try {
            const hash = await hashFile(file);
            setFileHash(hash);
        } catch (err) {
            console.error('Erreur hash fichier:', err);
            setFileHash(null);
        } finally {
            setIsHashingFile(false);
        }
    };
    
    // Supprime le fichier joint
    const handleRemoveFile = () => {
        setAttachedFile(null);
        setFileHash(null);
        if (fileInputRef.current) {
            fileInputRef.current.value = '';
        }
    };
    
    const handleScanIdentity = (data) => {
        setShowScanner(false);
        try {
            const parsed = JSON.parse(data);
            if (parsed.type === 'pss-identity' && parsed.publicKey) {
                setManualKey(parsed.publicKey);
                setManualAlias(parsed.alias || '');
            }
        } catch (e) {
            console.error('Erreur parsing QR:', e);
        }
    };

    const handleAddManualContact = async () => {
        if (!manualKey.trim() || !manualAlias.trim()) return;
        
        const contact = {
            publicKey: manualKey.trim(),
            alias: manualAlias.trim(),
            addedAt: new Date().toISOString()
        };
        
        await Storage.saveContact(contact);
        onContactAdded(contact);
        setCounterparty(contact);
        setManualKey('');
        setManualAlias('');
        setStep(2);
    };
    
    const handleCreateAgreement = async () => {
        if (!agreementText.trim() || !counterparty) return;
        
        setIsCreating(true);
        
        try {
            const parties = [
                { publicKey: identity.publicKey, alias: identity.alias },
                { publicKey: counterparty.publicKey, alias: counterparty.alias }
            ];
            
            const agreementManifest = BSS.createAgreementManifest(
                parties,
                agreementText.trim(),
                deadline || null,
                conditions.trim() || null
            );
            
            // Ajouter info fichier si présent
            if (attachedFile && fileHash) {
                agreementManifest.attachment = {
                    filename: attachedFile.name,
                    size: attachedFile.size,
                    type: attachedFile.type || 'application/octet-stream',
                    hash: fileHash
                };
            }
            
            const manifestString = JSON.stringify(agreementManifest);
            const agreementHash = await Crypto.sha256(manifestString);
            
            // Calcul des hash
            let combinedHash = agreementHash;
            if (fileHash) {
                // Hash combiné = SHA256(hashAccord + hashFichier)
                combinedHash = await Crypto.sha256(agreementHash + fileHash);
            }
            
            const mySignature = Crypto.sign(combinedHash, identity.privateKey);
            const signatureManifest = BSS.createSignatureManifest(
                agreementManifest.id,
                combinedHash,
                identity.publicKey,
                mySignature
            );
            
            const agreement = {
                id: agreementManifest.id,
                manifest: agreementManifest,
                hash: agreementHash,           // Hash de l'accord seul
                fileHash: fileHash || null,    // Hash du fichier (si présent)
                combinedHash: combinedHash,    // Hash combiné (accord + fichier)
                signatures: [signatureManifest],
                status: 'awaiting_signature',
                anchor: null,
                createdAt: new Date().toISOString()
            };
            
            await Storage.saveAgreement(agreement);
            setCreatedAgreement(agreement);
            setStep(3);
        } catch (error) {
            console.error('Erreur création accord:', error);
        } finally {
            setIsCreating(false);
        }
    };
    
    const handleAnchor = async () => {
        if (!createdAgreement) return;
        
        setIsAnchoring(true);
        
        try {
            // Utiliser le hash combiné pour l'ancrage (inclut le fichier si présent)
            const hashToAnchor = createdAgreement.combinedHash || createdAgreement.hash;
            
            // Métadonnées pour l'ancrage
            const metadata = createdAgreement.fileHash ? 'accord+fichier' : 'accord';
            
            const result = await AnchorService.anchor(hashToAnchor, metadata, false);
            
            if (result.success) {
                const anchorManifest = BSS.createAnchorManifest(
                    createdAgreement.id,
                    hashToAnchor,
                    result.txid,
                    result.blockchain
                );
                
                // Ajouter les infos de hash dans l'ancrage
                anchorManifest.hashes = {
                    agreement: createdAgreement.hash,
                    file: createdAgreement.fileHash || null,
                    combined: createdAgreement.combinedHash
                };
                
                const updatedAgreement = {
                    ...createdAgreement,
                    anchor: anchorManifest,
                    status: createdAgreement.signatures.length >= 2 ? 'active' : 'awaiting_signature'
                };
                
                await Storage.saveAgreement(updatedAgreement);
                setCreatedAgreement(updatedAgreement);
                onAgreementCreated(updatedAgreement);
                setStep(4);
            }
        } catch (error) {
            console.error('Erreur ancrage:', error);
        } finally {
            setIsAnchoring(false);
        }
    };
    
    const resetForm = () => {
        setStep(1);
        setCounterparty(null);
        setAgreementText('');
        setDeadline('');
        setConditions('');
        setCreatedAgreement(null);
        setAttachedFile(null);
        setFileHash(null);
        if (fileInputRef.current) {
            fileInputRef.current.value = '';
        }
    };

    // Scanner QR
    if (showScanner) {
        return (
            <QRScanner
                onScan={handleScanIdentity}
                onClose={() => setShowScanner(false)}
            />
        );
    }
    
    return (
        <div className="animate-fade">
            {/* Progress bar */}
            <div style={{
                display: 'flex',
                gap: '8px',
                marginBottom: '24px'
            }}>
                {[1, 2, 3, 4].map(s => (
                    <div key={s} style={{
                        flex: 1,
                        height: '4px',
                        borderRadius: '2px',

                        transition: 'background 0.3s ease'
                    }} />
                ))}
            </div>
            
            {/* Étape 1: Sélection contrepartie */}
            {step === 1 && (
                <div>
                    <h2 style={{ fontSize: '20px', fontWeight: '600', marginBottom: '8px' }}>
                        Avec qui ?
                    </h2>
                    <p style={{ color: 'var(--text-secondary)', marginBottom: '24px', fontSize: '14px' }}>
                        Sélectionnez ou ajoutez la personne avec qui vous créez cet accord.
                    </p>
                    
                    {contacts.length > 0 && (
                        <div style={{ marginBottom: '24px' }}>
                            <label style={styles.label}>Contacts existants</label>
                            {contacts.map(contact => (
                                <div
                                    key={contact.publicKey}
                                    style={{
                                        ...styles.card,
                                        cursor: 'pointer',
                                        display: 'flex',
                                        alignItems: 'center',
                                        gap: '12px',
                                        marginBottom: '8px',
                                        border: counterparty?.publicKey === contact.publicKey 
                                            ? '1px solid var(--accent-primary)' 
                                            : '1px solid var(--border-color)'
                                    }}
                                    onClick={() => {
                                        setCounterparty(contact);
                                        setStep(2);
                                    }}
                                >
                                    <div style={{
                                        width: '40px',
                                        height: '40px',
                                        background: 'var(--bg-tertiary)',
                                        borderRadius: '10px',
                                        display: 'flex',
                                        alignItems: 'center',
                                        justifyContent: 'center',
                                        fontWeight: '600'
                                    }}>
                                        {contact.alias.charAt(0).toUpperCase()}
                                    </div>
                                    <div>
                                        <p style={{ fontWeight: '500' }}>{contact.alias}</p>
                                        <p style={{ 
                                            color: 'var(--text-muted)', 
                                            fontSize: '12px',
                                            fontFamily: "'JetBrains Mono', monospace"
                                        }}>
                                            {Crypto.shortId(contact.publicKey)}
                                        </p>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}
                    
                    <div style={styles.card}>
                        <h3 style={{ fontSize: '16px', fontWeight: '600', marginBottom: '16px' }}>
                            Ajouter un contact
                        </h3>
                        
                        <button
                            style={{ ...styles.buttonSecondary, marginBottom: '16px' }}
                            onClick={() => setShowScanner(true)}
                        >
                            <Icons.Camera /> Scanner un QR code
                        </button>

                        <div style={{

                            color: 'var(--text-muted)', 
                            fontSize: '13px',
                            margin: '16px 0'
                        }}>

                        </div>
                        
                        <div style={{ marginBottom: '16px' }}>
                            <label style={styles.label}>Nom / Alias</label>
                            <input

            {/* Étape 2: Rédaction de l'accord */}

                                    <button
                                        type="button"

                                            borderRadius: '50%',

                    <div style={{ display: 'flex', gap: '12px' }}>

            {/* Étape 3: Partage pour co-signature */}

                    onAnchor={handleAnchor}
                    onSkip={() => {

            {/* Étape 4: Succès */}
            {step === 4 && createdAgreement && (
                <div style={{ textAlign: 'center' }}>

                    {createdAgreement.anchor && (

                                    fontFamily: "'JetBrains Mono', monospace",
                                    fontSize: '10px',
                                    color: 'var(--accent-primary)',

                    <button
                        style={{ ...styles.button, marginTop: '16px' }}
                        onClick={resetForm}

                        Créer un autre accord

                </div>
            )}
        </div>
    );
};

// Composant pour l'étape partage + ancrage

    const [qrDataUrl, setQrDataUrl] = useState('');
    const [shareLink, setShareLink] = useState('');
    const [copied, setCopied] = useState(false);

    useEffect(() => {
        generateShare();
    }, [agreement]);

    const generateShare = async () => {
        const link = ShareService.generateShareLink(agreement, identity);
        setShareLink(link);

        try {
            const url = await QRCode.toDataURL(link, {
                width: 200,
                margin: 2,
                color: { dark: '#f0f0f5', light: '#1a1a2e' }
            });
            setQrDataUrl(url);
        } catch (err) {
            console.error('Erreur QR:', err);
        }

    const copyLink = async () => {

    return (
        <div>
            <div style={{
                width: '60px',
                height: '60px',
                background: 'rgba(0, 212, 170, 0.15)',
                borderRadius: '50%',

                <Icons.Check />
            </div>
            
            <h2 style={{ fontSize: '20px', fontWeight: '600', marginBottom: '8px', textAlign: 'center' }}>
                Accord créé et signé !
            </h2>
            <p style={{ color: 'var(--text-secondary)', marginBottom: '24px', fontSize: '14px', textAlign: 'center' }}>
                Partagez-le pour obtenir la co-signature de {agreement.manifest.parties.find(p => p.publicKey !== identity.publicKey)?.alias}.
            </p>

            {/* QR Code de partage */}
            <div style={styles.card}>
                <h3 style={{ fontSize: '16px', fontWeight: '600', marginBottom: '16px', textAlign: 'center' }}>
                    Partager pour co-signature
                </h3>
                
                {qrDataUrl && (
                    <div style={{ display: 'flex', justifyContent: 'center', marginBottom: '16px' }}>
                        <img 
                            src={qrDataUrl} 
                            alt="QR Code partage"
                            style={{
                                borderRadius: 'var(--radius-sm)',
                                border: '1px solid var(--border-color)'
                            }}
                        />
                    </div>
                )}

                <div style={{ display: 'flex', gap: '8px', marginBottom: '12px' }}>
                    <button
                        style={{ ...styles.buttonSecondary, flex: 1 }}
                        onClick={copyLink}
                    >
                        <Icons.Copy /> {copied ? 'Copié !' : 'Copier lien'}
                    </button>
                    <button
                        style={{ ...styles.buttonSecondary, flex: 1 }}
                        onClick={() => ShareService.exportToFile(agreement, identity)}
                    >
                        <Icons.Download /> Fichier
                    </button>
                </div>

                {navigator.share && (
                    <button
                        style={styles.button}
                        onClick={async () => {
                            try {
                                await navigator.share({
                                    title: 'Accord PSS/BSS à signer',
                                    text: `${identity.alias} vous invite à signer un accord`,
                                    url: shareLink
                                });
                            } catch (err) {}
                        }}
                    >
                        <Icons.Share /> Partager
                    </button>
                )}
            </div>

            {/* Section ancrage */}
            <div style={styles.card}>
                <h3 style={{ fontSize: '16px', fontWeight: '600', marginBottom: '12px' }}>
                    Ancrer sur blockchain
                </h3>
                <p style={{ color: 'var(--text-muted)', fontSize: '13px', marginBottom: '16px' }}>
                    L'ancrage inscrit le hash de l'accord sur Bitcoin Cash, créant une preuve horodatée infalsifiable.
                </p>
                
                <div style={{ marginBottom: '12px' }}>
                    <label style={styles.label}>Hash SHA-256</label>
                    <p style={{
                        fontFamily: "'JetBrains Mono', monospace",
                        fontSize: '10px',

                style={{ ...styles.buttonSecondary, marginTop: '8px' }}

                Terminer sans ancrer
            </button>
        </div>
    );
};

// Écran Liste des Accords
const AgreementsScreen = ({ agreements, identity, onViewAgreement, onDeleteAgreement }) => {
    const calculateStatus = (agreement) => {
        if (agreement.status === 'respected' || agreement.status === 'broken') {
            return agreement.status;
        }

        // Vérifier si toutes les parties ont signé
        const allSigned = agreement.manifest.parties.every(party =>
            agreement.signatures.some(sig => sig.publicKey === party.publicKey)
        );

        if (!allSigned) {
            return 'awaiting_signature';
        }
        
        if (!agreement.manifest.deadline) {
            return agreement.anchor ? 'active' : 'pending';
        }
        
        const deadline = new Date(agreement.manifest.deadline);
        const now = new Date();
        
        if (now > deadline) {
            return 'late';
        }
        
        return agreement.anchor ? 'active' : 'pending';
    };
    
    const sortedAgreements = [...agreements].sort((a, b) => 
        new Date(b.createdAt) - new Date(a.createdAt)
    );
    
    if (agreements.length === 0) {
        return (
            <div style={{ textAlign: 'center', padding: '60px 20px' }} className="animate-fade">
                <div style={{
                    width: '80px',
                    height: '80px',
                    background: 'var(--bg-tertiary)',
                    borderRadius: '20px',
                    display: 'flex',
                    alignItems: 'center',
                    justifyContent: 'center',
                    margin: '0 auto 24px',
                    color: 'var(--text-muted)'
                }}>
                    <Icons.FileText />
                </div>
                
                <h2 style={{ fontSize: '20px', fontWeight: '600', marginBottom: '8px' }}>
                    Aucun accord
                </h2>
                <p style={{ color: 'var(--text-secondary)', fontSize: '14px' }}>
                    Créez votre premier accord pour commencer.
                </p>
            </div>
        );
    }
    
    return (
        <div className="animate-fade">
            <div style={{
                display: 'flex',
                justifyContent: 'space-between',
                alignItems: 'center',
                marginBottom: '20px'
            }}>
                <h2 style={{ fontSize: '20px', fontWeight: '600' }}>
                    Mes accords
                </h2>
                <span style={{ color: 'var(--text-muted)', fontSize: '14px' }}>

    );
    
    const handleAnchor = async () => {
        setIsAnchoring(true);
        try {
            // Utiliser le hash combiné si fichier présent
            const hashToAnchor = agreement.combinedHash || agreement.hash;
            const metadata = agreement.fileHash ? 'accord+fichier' : 'accord';
            
            const result = await AnchorService.anchor(hashToAnchor, metadata, false);
            if (result.success) {
                const anchorManifest = BSS.createAnchorManifest(
                    agreement.id,
                    hashToAnchor,
                    result.txid,
                    result.blockchain
                );
                
                // Ajouter les infos de hash
                anchorManifest.hashes = {
                    agreement: agreement.hash,
                    file: agreement.fileHash || null,
                    combined: agreement.combinedHash || agreement.hash
                };
                
                await onAnchor(agreement.id, anchorManifest);

        const seed = generateSeedPhrase(numWords);
        setGeneratedSeed(seed);
        setSeedConfirmed(false);
    };
    
    // Création de wallet avec seed phrase
    const handleCreateWallet = async () => {
        if (!generatedSeed) {
            onShowToast('Générez d\'abord une phrase de récupération', 'error');
            return;
        }
        if (!seedConfirmed) {
            onShowToast('Confirmez avoir sauvegardé la phrase', 'error');
            return;
        }
        if (!password || password.length < 8) {
            onShowToast('Mot de passe: minimum 8 caractères', 'error');
            return;
        }
        if (password !== passwordConfirm) {
            onShowToast('Les mots de passe ne correspondent pas', 'error');
            return;
        }
        
        setIsLoading(true);
        try {
            const result = await PssApi.createWallet(password, numWords, generatedSeed);
            
            if (result.error) {
                onShowToast(result.error, 'error');
            } else {
                await checkApi();
                onShowToast('✅ Wallet créé !', 'success');
                resetForms();
            }
        } catch (e) {
            onShowToast('Erreur: ' + e.message, 'error');
        }
        setIsLoading(false);
    };
    
    // Déverrouillage du wallet
    const handleUnlockWallet = async () => {
        if (!password) {
            onShowToast('Entrez votre mot de passe', 'error');
            return;
        }
        
        setIsLoading(true);
        try {
            const result = await PssApi.unlockWallet(password);
            
            if (result.error) {
                onShowToast('❌ ' + result.error, 'error');
            } else {
                await checkApi();
                onShowToast('🔓 Wallet déverrouillé', 'success');
                resetForms();
            }
        } catch (e) {
            onShowToast('Erreur: ' + e.message, 'error');
        }
        setIsLoading(false);
    };
    
    // Verrouillage du wallet
    const handleLockWallet = async () => {
        await PssApi.lockWallet();
        await checkApi();
        onShowToast('🔒 Wallet verrouillé', 'success');
    };
    
    // Changement de réseau
    const handleSwitchNetwork = async (newNetwork) => {
        const isMainnet = newNetwork === 'mainnet';
        
        if (isMainnet && !confirm('⚠️ ATTENTION!\n\nVous passez en MAINNET (argent réel).\n\nConfirmer?')) {
            return;
        }
        
        setIsSwitchingNetwork(true);
        try {
            const result = await PssApi.setNetwork(newNetwork, isMainnet);
            
            if (result.error) {
                onShowToast(result.error, 'error');
            } else if (result.warning) {
                onShowToast(result.message, 'warning');
            } else {
                await checkApi();
                onShowToast(`Réseau: ${newNetwork.toUpperCase()}`, 'success');
            }
        } catch (e) {
            onShowToast('Erreur: ' + e.message, 'error');
        }
        setIsSwitchingNetwork(false);
    };
    
    // Import de wallet (par seed ou WIF)
    const handleImportWallet = async () => {
        const hasInput = importMode === 'seed' ? seedInput.trim() : wifInput.trim();
        
        if (!hasInput) {
            onShowToast(importMode === 'seed' ? 'Entrez votre phrase de récupération' : 'Entrez un WIF valide', 'error');
            return;
        }
        if (!password || password.length < 8) {
            onShowToast('Mot de passe: minimum 8 caractères', 'error');
            return;
        }
        
        // Vérifier le nombre de mots si seed
        if (importMode === 'seed') {
            const words = seedInput.trim().split(/\s+/);
            if (words.length !== 12 && words.length !== 24) {
                onShowToast('La phrase doit contenir 12 ou 24 mots', 'error');
                return;
            }
        }
        
        setIsLoading(true);
        try {
            let result;
            if (importMode === 'seed') {
                result = await PssApi.importWalletFromSeed(seedInput.trim(), password);
            } else {
                result = await PssApi.importWallet(wifInput.trim(), password);
            }
            
            if (result.error) {
                onShowToast(result.error, 'error');
            } else {
                await checkApi();
                onShowToast('✅ Wallet importé !', 'success');
                resetForms();
            }
        } catch (e) {
            onShowToast('Erreur: ' + e.message, 'error');
        }
        setIsLoading(false);
    };
    
    // Export du wallet (seed phrase + WIF)
    const handleExportWallet = async () => {
        if (exportConfirm !== 'JE COMPRENDS LE RISQUE') {
            onShowToast('Tapez exactement: JE COMPRENDS LE RISQUE', 'error');
            return;
        }
        if (!password) {
            onShowToast('Entrez votre mot de passe', 'error');
            return;
        }
        
        setIsLoading(true);
        try {
            const result = await PssApi.exportWallet(password, exportConfirm);
            
            if (result.error) {
                onShowToast('❌ ' + result.error, 'error');
            } else {
                if (result.seed_phrase) setExportedSeed(result.seed_phrase);
                if (result.wif) setExportedWif(result.wif);
                onShowToast('Données exportées', 'success');
            }
        } catch (e) {
            onShowToast('Erreur: ' + e.message, 'error');
        }
        setIsLoading(false);
    };
    
    const copyAddress = async () => {
        if (wallet?.address) {
            await navigator.clipboard.writeText(wallet.address);
            onShowToast('Adresse copiée !');
        }
    };
    
    const copyWif = async () => {
        if (exportedWif) {
            await navigator.clipboard.writeText(exportedWif);
            onShowToast('⚠️ WIF copié - gardez-le secret !', 'warning');
        }
    };
    
    const formatSatoshis = (sats) => {
        if (sats === null || sats === undefined) return '—';
        const bch = sats / 100000000;
        return bch.toFixed(8) + ' BCH';
    };
    
    // Toggle Réseau (Simulation / Testnet / Mainnet)
    const NetworkToggle = () => {
        const network = apiStatus?.network || 'simulation';
        const isMainnet = network === 'mainnet';
        const isTestnet = network === 'testnet';
        const isSimulation = !isMainnet && !isTestnet;
        
        // Couleurs neutres (pas de rouge alarmiste)
        const getColor = () => {
            if (isMainnet) return { bg: 'rgba(141, 195, 81, 0.15)', border: 'rgba(141, 195, 81, 0.5)', text: '#8dc351' };
            if (isTestnet) return { bg: 'rgba(116, 185, 255, 0.15)', border: 'rgba(116, 185, 255, 0.5)', text: 'var(--accent-info)' };
            return { bg: 'rgba(178, 190, 195, 0.15)', border: 'rgba(178, 190, 195, 0.5)', text: 'var(--text-secondary)' };
        };
        const colors = getColor();
        
        return (
            <div style={{
                padding: '12px 16px',
                background: colors.bg,
                border: `1px solid ${colors.border}`,
                borderRadius: 'var(--radius)',
                marginBottom: '16px'
            }}>
                <div style={{ 
                    display: 'flex', 
                    alignItems: 'center', 
                    justifyContent: 'space-between',
                    marginBottom: '8px'
                }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                        <span style={{ fontSize: '16px' }}>
                            {isMainnet ? '💎' : isTestnet ? '🧪' : '🔄'}
                        </span>
                        <span style={{ fontWeight: '600', color: colors.text }}>
                            {isMainnet ? 'BCH Réel' : isTestnet ? 'Testnet BCH' : 'Simulation'}
                        </span>
                    </div>
                    
                    {/* Toggle Switch - 3 modes */}
                    <div style={{
                        display: 'flex',
                        background: 'var(--bg-tertiary)',
                        borderRadius: '20px',
                        padding: '3px',
                        gap: '2px'
                    }}>
                        <button
                            style={{
                                padding: '5px 10px',
                                borderRadius: '14px',
                                border: 'none',
                                cursor: isSwitchingNetwork ? 'wait' : 'pointer',
                                fontSize: '10px',
                                fontWeight: '600',
                                background: isSimulation ? 'var(--text-secondary)' : 'transparent',
                                color: isSimulation ? 'white' : 'var(--text-muted)',
                                transition: 'all 0.2s',
                                opacity: isSwitchingNetwork ? 0.5 : 1
                            }}
                            onClick={() => handleSwitchNetwork('simulation')}
                            disabled={isSimulation || isSwitchingNetwork}
                            title="Simulation locale sans blockchain"
                        >
                            🔄 Simu
                        </button>
                        <button
                            style={{
                                padding: '5px 10px',
                                borderRadius: '14px',
                                border: 'none',
                                cursor: isSwitchingNetwork ? 'wait' : 'pointer',
                                fontSize: '10px',
                                fontWeight: '600',
                                background: isTestnet ? 'var(--accent-info)' : 'transparent',
                                color: isTestnet ? 'white' : 'var(--text-muted)',
                                transition: 'all 0.2s',
                                opacity: isSwitchingNetwork ? 0.5 : 1
                            }}
                            onClick={() => handleSwitchNetwork('testnet')}
                            disabled={isTestnet || isSwitchingNetwork}
                            title="Testnet BCH (peut être instable)"
                        >
                            🧪 Test
                        </button>
                        <button
                            style={{
                                padding: '5px 10px',
                                borderRadius: '14px',
                                border: 'none',
                                cursor: isSwitchingNetwork ? 'wait' : 'pointer',
                                fontSize: '10px',
                                fontWeight: '600',
                                background: isMainnet ? '#8dc351' : 'transparent',
                                color: isMainnet ? 'white' : 'var(--text-muted)',
                                transition: 'all 0.2s',
                                opacity: isSwitchingNetwork ? 0.5 : 1
                            }}
                            onClick={() => handleSwitchNetwork('mainnet')}
                            disabled={isMainnet || isSwitchingNetwork}
                            title="BCH réel sur le mainnet"
                        >
                            💎 Réel
                        </button>
                    </div>
                </div>
                
                <p style={{ fontSize: '11px', color: 'var(--text-muted)', margin: 0 }}>
                    {isMainnet 
                        ? '💰 Transactions réelles sur Bitcoin Cash' 
                        : isTestnet 
                            ? '⚠️ Testnet BCH - Disponibilité variable, peut être hors ligne'
                            : '✅ Mode simulation - Aucune transaction réelle, idéal pour tester'}
                </p>
            </div>
        );
    };
    
    // Mode autonome - toujours disponible
    
    return (
        <div className="animate-fade">

            <div style={{
                display: 'flex',
                alignItems: 'center',
                justifyContent: 'space-between',
                marginBottom: '16px'
            }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: '12px' }}>
                    <div style={{
                        width: '48px',
                        height: '48px',
                        background: 'linear-gradient(135deg, #8dc351, #6ba32d)',
                        borderRadius: '12px',
                        display: 'flex',
                        alignItems: 'center',
                        justifyContent: 'center'
                    }}>
                        <Icons.Wallet />
                    </div>
                    <div>
                        <h2 style={{ fontSize: '20px', fontWeight: '600' }}>Wallet BCH</h2>
                        <p style={{ color: 'var(--text-muted)', fontSize: '13px' }}>
                            Clé de paiement (ancrage)
                        </p>
                    </div>
                </div>
                
                <div style={{
                    padding: '6px 12px',
                    background: 'rgba(141, 195, 81, 0.2)',
                    borderRadius: '20px',
                    fontSize: '12px',
                    color: '#8dc351'
                }}>
                    ✅ API v2.0
                </div>
            </div>
            
            {/* Badge mode autonome */}
            <div style={{
                padding: '8px 14px',
                background: 'rgba(116, 185, 255, 0.15)',
                border: '1px solid rgba(116, 185, 255, 0.3)',
                borderRadius: 'var(--radius-sm)',
                marginBottom: '16px',
                textAlign: 'center',
                fontSize: '12px',
                color: 'var(--accent-info)'
            }}>
                📱 Mode autonome — tout fonctionne sur le téléphone
            </div>
            
            {/* Toggle Réseau */}
            <NetworkToggle />
            
            {isLoading ? (
                <div style={{ textAlign: 'center', padding: '40px' }}>
                    <div className="animate-spin" style={{
                        width: '40px',
                        height: '40px',
                        border: '3px solid var(--bg-tertiary)',
                        borderTopColor: '#8dc351',
                        borderRadius: '50%',
                        margin: '0 auto 16px'
                    }} />
                    <p style={{ color: 'var(--text-muted)' }}>Chargement...</p>
                </div>
            ) : !wallet?.configured ? (
                /* Pas de wallet configuré */
                <div style={styles.card}>
                    <h3 style={{ fontSize: '16px', fontWeight: '600', marginBottom: '16px' }}>
                        🔐 Configurer un wallet
                    </h3>
                    
                    {!showCreate && !showImport ? (
                        <>
                            <button
                                style={{ ...styles.button, background: '#8dc351', marginBottom: '12px' }}
                                onClick={() => setShowCreate(true)}
                            >
                                ➕ Créer un nouveau wallet
                            </button>
                            
                            <button
                                style={styles.buttonSecondary}
                                onClick={() => setShowImport(true)}
                            >
                                📥 Restaurer un wallet existant
                            </button>
                        </>
                    ) : showCreate ? (
                        /* Formulaire création avec seed phrase */
                        <div>
                            {!generatedSeed ? (
                                /* Étape 1: Choisir et générer */
                                <>
                                    <p style={{ color: 'var(--text-secondary)', fontSize: '13px', marginBottom: '16px' }}>
                                        Choisissez le nombre de mots pour votre phrase de récupération :
                                    </p>
                                    
                                    <div style={{ display: 'flex', gap: '12px', marginBottom: '20px' }}>
                                        <button
                                            style={{
                                                ...styles.buttonSecondary,
                                                flex: 1,
                                                background: numWords === 12 ? 'rgba(141, 195, 81, 0.2)' : 'transparent',
                                                borderColor: numWords === 12 ? '#8dc351' : 'var(--border-color)'
                                            }}
                                            onClick={() => setNumWords(12)}
                                        >
                                            <strong>12 mots</strong>
                                            <br/><span style={{ fontSize: '11px', color: 'var(--text-muted)' }}>Standard</span>
                                        </button>
                                        <button
                                            style={{
                                                ...styles.buttonSecondary,
                                                flex: 1,
                                                background: numWords === 24 ? 'rgba(141, 195, 81, 0.2)' : 'transparent',
                                                borderColor: numWords === 24 ? '#8dc351' : 'var(--border-color)'
                                            }}
                                            onClick={() => setNumWords(24)}
                                        >
                                            <strong>24 mots</strong>
                                            <br/><span style={{ fontSize: '11px', color: 'var(--text-muted)' }}>Renforcé</span>
                                        </button>
                                    </div>
                                    
                                    <button
                                        style={{ ...styles.button, background: '#8dc351', marginBottom: '12px' }}
                                        onClick={handleGenerateSeed}
                                    >
                                        🎲 Générer la phrase ({numWords} mots)
                                    </button>
                                    
                                    <button style={styles.buttonSecondary} onClick={resetForms}>
                                        Annuler
                                    </button>
                                </>
                            ) : !seedConfirmed ? (
                                /* Étape 2: Afficher et confirmer la seed */
                                <>
                                    <div style={{
                                        background: 'rgba(141, 195, 81, 0.1)',
                                        border: '2px solid rgba(141, 195, 81, 0.3)',
                                        borderRadius: 'var(--radius)',
                                        padding: '16px',
                                        marginBottom: '16px'
                                    }}>
                                        <p style={{ 
                                            color: '#8dc351', 
                                            fontWeight: '600', 
                                            marginBottom: '12px',
                                            fontSize: '14px'
                                        }}>
                                            📝 Votre phrase de récupération ({numWords} mots)
                                        </p>
                                        
                                        <div style={{
                                            display: 'grid',
                                            gridTemplateColumns: 'repeat(3, 1fr)',
                                            gap: '8px',
                                            marginBottom: '12px'
                                        }}>
                                            {generatedSeed.split(' ').map((word, i) => (
                                                <div key={i} style={{
                                                    background: 'var(--bg-secondary)',
                                                    padding: '6px 10px',
                                                    borderRadius: 'var(--radius-sm)',
                                                    fontSize: '12px',
                                                    display: 'flex',
                                                    gap: '6px'
                                                }}>
                                                    <span style={{ color: 'var(--text-muted)', minWidth: '18px' }}>{i+1}.</span>
                                                    <span style={{ fontFamily: "'JetBrains Mono', monospace" }}>{word}</span>
                                                </div>
                                            ))}
                                        </div>
                                        
                                        <button
                                            style={{ ...styles.buttonSmall, width: '100%' }}
                                            onClick={() => {
                                                navigator.clipboard.writeText(generatedSeed);
                                                onShowToast('Phrase copiée !');
                                            }}
                                        >
                                            <Icons.Copy /> Copier la phrase
                                        </button>
                                    </div>
                                    
                                    <div style={{
                                        background: 'rgba(253, 203, 110, 0.1)',
                                        border: '1px solid rgba(253, 203, 110, 0.3)',
                                        borderRadius: 'var(--radius-sm)',
                                        padding: '12px',
                                        marginBottom: '16px'
                                    }}>
                                        <p style={{ color: 'var(--accent-warning)', fontSize: '12px' }}>
                                            ⚠️ <strong>IMPORTANT</strong> : Notez ces mots dans l'ordre exact. 
                                            Sans eux, vous ne pourrez pas récupérer votre wallet.
                                        </p>
                                    </div>
                                    
                                    <label style={{ 
                                        display: 'flex', 
                                        alignItems: 'center', 
                                        gap: '10px',
                                        marginBottom: '16px',
                                        cursor: 'pointer'
                                    }}>
                                        <input
                                            type="checkbox"
                                            checked={seedConfirmed}
                                            onChange={e => setSeedConfirmed(e.target.checked)}
                                            style={{ width: '18px', height: '18px' }}
                                        />
                                        <span style={{ fontSize: '13px' }}>
                                            J'ai sauvegardé ma phrase de récupération
                                        </span>
                                    </label>
                                    
                                    <div style={{ display: 'flex', gap: '8px' }}>
                                        <button
                                            style={{ ...styles.buttonSecondary, flex: 1 }}
                                            onClick={() => setGeneratedSeed('')}
                                        >
                                            ← Retour
                                        </button>
                                        <button
                                            style={{ 
                                                ...styles.button, 
                                                background: '#8dc351', 
                                                flex: 1,
                                                opacity: seedConfirmed ? 1 : 0.5
                                            }}
                                            onClick={() => seedConfirmed && setSeedConfirmed(true)}
                                            disabled={!seedConfirmed}
                                        >
                                            Continuer →
                                        </button>
                                    </div>
                                </>
                            ) : (
                                /* Étape 3: Mot de passe */
                                <>
                                    <p style={{ color: 'var(--text-secondary)', fontSize: '13px', marginBottom: '16px' }}>
                                        🔒 Choisissez un mot de passe pour chiffrer votre wallet :
                                    </p>
                                    
                                    <div style={{ marginBottom: '12px' }}>
                                        <label style={styles.label}>Mot de passe (min 8 caractères)</label>
                                        <input
                                            type="password"
                                            style={styles.input}
                                            placeholder="Minimum 8 caractères"
                                            value={password}
                                            onChange={e => setPassword(e.target.value)}
                                            autoFocus
                                        />
                                    </div>
                                    
                                    <div style={{ marginBottom: '16px' }}>
                                        <label style={styles.label}>Confirmer le mot de passe</label>
                                        <input
                                            type="password"
                                            style={styles.input}
                                            placeholder="Répétez le mot de passe"
                                            value={passwordConfirm}
                                            onChange={e => setPasswordConfirm(e.target.value)}
                                        />
                                    </div>
                                    
                                    <div style={{ display: 'flex', gap: '8px' }}>
                                        <button
                                            style={{ ...styles.buttonSecondary, flex: 1 }}
                                            onClick={() => setSeedConfirmed(false)}
                                        >
                                            ← Retour
                                        </button>
                                        <button
                                            style={{ 
                                                ...styles.button, 
                                                background: '#8dc351', 
                                                flex: 1,
                                                opacity: (password.length >= 8 && password === passwordConfirm) ? 1 : 0.5
                                            }}
                                            onClick={handleCreateWallet}
                                            disabled={password.length < 8 || password !== passwordConfirm}
                                        >
                                            ✅ Créer le wallet
                                        </button>
                                    </div>
                                </>
                            )}
                        </div>
                    ) : (
                        /* Formulaire import (seed ou WIF) */
                        <div>
                            {/* Toggle mode import */}
                            <div style={{ display: 'flex', gap: '8px', marginBottom: '16px' }}>
                                <button
                                    style={{
                                        ...styles.buttonSmall,
                                        flex: 1,
                                        background: importMode === 'seed' ? '#8dc351' : 'var(--bg-tertiary)',
                                        color: importMode === 'seed' ? 'white' : 'var(--text-muted)'
                                    }}
                                    onClick={() => setImportMode('seed')}
                                >
                                    📝 Phrase (12/24 mots)
                                </button>
                                <button
                                    style={{
                                        ...styles.buttonSmall,
                                        flex: 1,
                                        background: importMode === 'wif' ? '#8dc351' : 'var(--bg-tertiary)',
                                        color: importMode === 'wif' ? 'white' : 'var(--text-muted)'
                                    }}
                                    onClick={() => setImportMode('wif')}
                                >
                                    🔑 Clé WIF
                                </button>
                            </div>
                            
                            {importMode === 'seed' ? (
                                <div style={{ marginBottom: '12px' }}>
                                    <label style={styles.label}>Phrase de récupération (12 ou 24 mots)</label>
                                    <textarea
                                        style={{ ...styles.textarea, minHeight: '100px', fontSize: '13px' }}
                                        placeholder="mot1 mot2 mot3 mot4 mot5 mot6 mot7 mot8 mot9 mot10 mot11 mot12"
                                        value={seedInput}
                                        onChange={e => setSeedInput(e.target.value.toLowerCase())}
                                    />
                                    {seedInput && (
                                        <p style={{ 
                                            fontSize: '11px', 
                                            color: seedInput.trim().split(/\s+/).length === 12 || seedInput.trim().split(/\s+/).length === 24 
                                                ? '#8dc351' : 'var(--accent-warning)',
                                            marginTop: '4px'
                                        }}>
                                            {seedInput.trim().split(/\s+/).length} mot(s) détecté(s)
                                        </p>
                                    )}
                                </div>
                            ) : (
                                <div style={{ marginBottom: '12px' }}>
                                    <label style={styles.label}>Clé privée WIF</label>
                                    <input
                                        type="password"
                                        style={styles.input}
                                        placeholder="Kx... ou L..."
                                        value={wifInput}
                                        onChange={e => setWifInput(e.target.value)}
                                    />
                                </div>
                            )}
                            
                            <div style={{ marginBottom: '16px' }}>
                                <label style={styles.label}>Nouveau mot de passe (min 8 car.)</label>
                                <input
                                    type="password"
                                    style={styles.input}
                                    placeholder="Pour chiffrer votre wallet"
                                    value={password}
                                    onChange={e => setPassword(e.target.value)}

                            <div style={{ display: 'flex', gap: '8px' }}>
