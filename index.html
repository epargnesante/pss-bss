<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>PSS / BSS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1a1a2e" />
  <link rel="manifest" href="manifest.json" />
  <style>
    body {
      margin: 0;
      padding: 2rem;
      font-family: Arial, sans-serif;
      background: #0f0f1a;
      color: #f0f0f5;
      text-align: center;
    }
    h1 { color: #00d4aa; }
    .ok { color: #00d4aa; }
    .ko { color: #e17055; }
    button {
      margin-top: 1rem;
      padding: 10px 16px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background: #00d4aa;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>PSS / BSS</h1>
  <p>Test GitHub Pages + Android</p>

  <p id="secure"></p>
  <p id="crypto"></p>
  <p id="storage"></p>

  <button onclick="testCrypto()">Tester crypto</button>

  <script>
    document.getElementById("secure").innerHTML =
      "HTTPS / Secure context : " +
      (window.isSecureContext ? "<span class='ok'>OK</span>" : "<span class='ko'>NON</span>");

    document.getElementById("crypto").innerHTML =
      "crypto.subtle : " +
      (window.crypto && crypto.subtle ? "<span class='ok'>OK</span>" : "<span class='ko'>NON</span>");

    document.getElementById("storage").innerHTML =
      "IndexedDB : " +
      (window.indexedDB ? "<span class='ok'>OK</span>" : "<span class='ko'>NON</span>");

    async function testCrypto() {
      const data = new TextEncoder().encode("pss-bss");
      const hash = await crypto.subtle.digest("SHA-256", data);
      const hex = Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, "0")).join("");
      alert("SHA-256 OK :\n" + hex);
    }
  </script>
</body>
</html>
